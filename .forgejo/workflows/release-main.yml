name: release-main

on:
  push:
    branches:
      - main

jobs:
  release-main:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.12.0
      - run: npm ci
      - run: git config user.name "forgejo-actions"
      - run: git config user.email "forgejo-actions@local"
      - run: npm run release:ci
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
