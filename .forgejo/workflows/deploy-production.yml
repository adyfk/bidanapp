name: deploy-production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v1.2.3
        required: true
        type: string

jobs:
  deploy-production:
    runs-on: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}
      - run: |
          export GITHUB_REF_TYPE=tag
          export GITHUB_REF_NAME="${{ inputs.release_tag }}"
          node ./scripts/release/export-build-metadata.cjs >> "$GITHUB_ENV"
      - run: echo "${{ secrets.FORGEJO_REGISTRY_TOKEN }}" | docker login "${GITHUB_SERVER_URL#https://}" -u "${{ secrets.FORGEJO_REGISTRY_USER }}" --password-stdin
      - run: |
          export BACKEND_IMAGE="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY_OWNER}/bidanapp-backend:${IMAGE_TAG}"
          export FRONTEND_IMAGE="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY_OWNER}/bidanapp-frontend:${IMAGE_TAG}"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> "$GITHUB_ENV"
      - run: |
          docker build -f apps/backend/Dockerfile \
            --build-arg OCI_CREATED="$OCI_CREATED" \
            --build-arg OCI_REVISION="$OCI_REVISION" \
            --build-arg OCI_SOURCE="$OCI_SOURCE" \
            --build-arg OCI_VERSION="$OCI_VERSION" \
            -t "$BACKEND_IMAGE" .
          docker push "$BACKEND_IMAGE"
      - run: |
          docker build -f apps/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.PRODUCTION_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.PRODUCTION_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_APP_VERSION="$APP_VERSION" \
            --build-arg OCI_CREATED="$OCI_CREATED" \
            --build-arg OCI_REVISION="$OCI_REVISION" \
            --build-arg OCI_SOURCE="$OCI_SOURCE" \
            --build-arg OCI_VERSION="$OCI_VERSION" \
            -t "$FRONTEND_IMAGE" .
          docker push "$FRONTEND_IMAGE"
      - run: |
          cat <<EOF > "$RUNNER_TEMP/production.env"
          COMPOSE_PROJECT_NAME=bidanapp-production
          APP_ENV=production
          APP_VERSION=$APP_VERSION
          BACKEND_IMAGE=$BACKEND_IMAGE
          FRONTEND_IMAGE=$FRONTEND_IMAGE
          BACKEND_PORT=${{ secrets.PRODUCTION_BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.PRODUCTION_FRONTEND_PORT }}
          POSTGRES_DB=${{ secrets.PRODUCTION_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.PRODUCTION_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
          DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}
          REDIS_URL=${{ secrets.PRODUCTION_REDIS_URL }}
          CORS_ALLOWED_ORIGINS=${{ secrets.PRODUCTION_CORS_ALLOWED_ORIGINS }}
          LOG_LEVEL=info
          LOG_FORMAT=json
          EOF
      - run: sh ./scripts/deploy/deploy.sh production "$RUNNER_TEMP/production.env"
      - run: curl --fail --silent --show-error "${{ secrets.PRODUCTION_HEALTHCHECK_URL }}"
