name: pr-governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  pr-title-lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.12.0
      - run: npm ci
      - run: npm run pr:title:lint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

  issue-link-check:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.12.0
      - run: npm ci
      - run: npm run pr:body:lint
        env:
          PR_BODY: ${{ github.event.pull_request.body }}

  branch-name-check:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.12.0
      - run: npm ci
      - run: npm run branch:lint
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}

  changeset-check:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.12.0
      - run: npm ci
      - run: npm run changeset:check
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
