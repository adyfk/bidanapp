name: deploy-staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: deploy
    steps:
      - uses: actions/checkout@v4
      - run: node ./scripts/release/export-build-metadata.cjs >> "$GITHUB_ENV"
      - run: echo "${{ secrets.FORGEJO_REGISTRY_TOKEN }}" | docker login "${GITHUB_SERVER_URL#https://}" -u "${{ secrets.FORGEJO_REGISTRY_USER }}" --password-stdin
      - run: |
          export BACKEND_IMAGE="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY_OWNER}/bidanapp-backend:${IMAGE_TAG}"
          export FRONTEND_IMAGE="${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY_OWNER}/bidanapp-frontend:${IMAGE_TAG}"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> "$GITHUB_ENV"
      - run: |
          docker build -f apps/backend/Dockerfile \
            --build-arg OCI_CREATED="$OCI_CREATED" \
            --build-arg OCI_REVISION="$OCI_REVISION" \
            --build-arg OCI_SOURCE="$OCI_SOURCE" \
            --build-arg OCI_VERSION="$OCI_VERSION" \
            -t "$BACKEND_IMAGE" .
          docker push "$BACKEND_IMAGE"
      - run: |
          docker build -f apps/frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.STAGING_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.STAGING_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_APP_VERSION="$APP_VERSION" \
            --build-arg OCI_CREATED="$OCI_CREATED" \
            --build-arg OCI_REVISION="$OCI_REVISION" \
            --build-arg OCI_SOURCE="$OCI_SOURCE" \
            --build-arg OCI_VERSION="$OCI_VERSION" \
            -t "$FRONTEND_IMAGE" .
          docker push "$FRONTEND_IMAGE"
      - run: |
          cat <<EOF > "$RUNNER_TEMP/staging.env"
          COMPOSE_PROJECT_NAME=bidanapp-staging
          APP_ENV=staging
          APP_VERSION=$APP_VERSION
          BACKEND_IMAGE=$BACKEND_IMAGE
          FRONTEND_IMAGE=$FRONTEND_IMAGE
          BACKEND_PORT=${{ secrets.STAGING_BACKEND_PORT }}
          FRONTEND_PORT=${{ secrets.STAGING_FRONTEND_PORT }}
          POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
          CORS_ALLOWED_ORIGINS=${{ secrets.STAGING_CORS_ALLOWED_ORIGINS }}
          LOG_LEVEL=info
          LOG_FORMAT=json
          EOF
      - run: sh ./scripts/deploy/deploy.sh staging "$RUNNER_TEMP/staging.env"
      - run: curl --fail --silent --show-error "${{ secrets.STAGING_HEALTHCHECK_URL }}"
